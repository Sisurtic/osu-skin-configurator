<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: asset: http://asset.localhost file:; connect-src 'self' ipc: http://ipc.localhost;">
  <style>html,body{background:#1a1a1a;}</style>
  <title>osu! Skin Configurator</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  <div class="app-shell">

    <!-- Title Bar. data-tauri-drag-region makes the bar draggable + double-click
         maximizes (Tauri native). The decorum control buttons inside opt out
         automatically (data-tauri-drag-region doesn't cascade to children), so
         they stay clickable. -->
    <header class="titlebar" data-tauri-drag-region>
      <div class="titlebar__title">
        <span class="titlebar__dot">
          <span class="titlebar__dot-core"></span>
          <svg class="titlebar__ring" viewBox="0 0 16 16" aria-hidden="true">
            <!-- The progress arc. Each revolution it breathes: extends from the
                 real progress toward a full circle, then retracts back. Spun +
                 colored by JS. -->
            <circle class="titlebar__ring-head" cx="8" cy="8" r="6" />
          </svg>
        </span>
        <span data-i18n="app.title">osu! Skin Configurator</span>
      </div>
      <!-- tauri-plugin-decorum injects the minimize/maximize/close buttons here. -->
      <div class="titlebar__controls" data-tauri-decorum-tb></div>
    </header>

    <!-- Toolbar -->
    <nav class="toolbar">
      <div class="toolbar__left">
        <div class="lang-switch" id="lang-switch">
          <button class="btn btn--ghost btn--sm lang-switch__btn toolbar__icon-btn" id="btn-lang" title="语言 / Language" data-i18n-title="toolbar.langTitle">
            <svg class="toolbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
          </button>
          <div class="lang-switch__menu" id="lang-menu"></div>
        </div>
        <button class="btn btn--ghost btn--sm toolbar__icon-btn" id="btn-settings" title="快捷键" data-i18n-title="toolbar.settingsTitle">
          <svg class="toolbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 10h0M10 10h0M14 10h0M18 10h0M6 14h12"/></svg>
        </button>
        <button class="btn btn--ghost btn--sm toolbar__icon-btn" id="btn-rescan" title="刷新" data-i18n-title="toolbar.rescanTitle">
          <svg class="toolbar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
        </button>
        <span class="toolbar__path" id="toolbar-path" data-i18n="app.pathUnset">未设置 osu! 路径</span>
      </div>
      <div class="toolbar__right" id="toolbar-actions">
        <button class="btn btn--secondary btn--sm" id="btn-apply-preset" disabled title="应用此预设到皮肤" data-i18n="toolbar.apply" data-i18n-title="toolbar.applyTitle">▶ 应用</button>
        <button class="btn btn--secondary btn--sm" id="btn-toggle-mode" title="切换使用/编辑模式" data-i18n-title="toolbar.toggleModeTitle">✏️</button>
      </div>
    </nav>

    <!-- Body -->
    <div class="app-body">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar__section sidebar__section--skins">
          <div class="sidebar__header">
            <span data-i18n="sidebar.skins">📁 皮肤列表</span>
            <span id="skin-count"></span>
          </div>
          <div class="search-input">
            <input type="text" id="skin-search" placeholder="搜索皮肤..." data-i18n-placeholder="sidebar.searchSkin">
          </div>
          <div class="sidebar__list" id="skin-list">
            <!-- populated by skin-list.js -->
          </div>
        </div>
        <div class="sidebar__section sidebar__section--skin-header" id="skin-header-section" style="display:none">
          <div class="sidebar__header">
            <span data-i18n="sidebar.currentSkin">🎨 当前皮肤</span>
          </div>
          <div style="padding:8px 14px;font-size:13px;font-weight:500;color:var(--accent)" id="skin-header-name"></div>
        </div>
        <div class="sidebar__section sidebar__section--presets" id="preset-section">
          <div class="sidebar__header">
            <span data-i18n="sidebar.presets">📄 预设</span>
            <span id="preset-count"></span>
          </div>
          <div class="sidebar__list" id="preset-list">
            <!-- populated by preset-list.js -->
          </div>
          <div id="preset-bottom-actions" style="display:none"></div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">

        <!-- View: Settings -->
        <div class="view centered-view" id="view-settings">
          <!-- populated by settings-view.js -->
        </div>

        <!-- View: Welcome / No skin selected -->
        <div class="view centered-view" id="view-welcome">
          <div class="card">
            <div class="card__icon">🎨</div>
            <h2 class="card__title" data-i18n="welcome.title">欢迎使用 osu! Skin Configurator</h2>
            <p class="card__desc" data-i18n="welcome.descSelect">从左侧选择一个皮肤以查看和管理预设</p>
          </div>
        </div>

        <!-- View: Preset Selector (Use Mode) -->
        <div class="view" id="view-selector">
          <!-- populated by preset-selector.js -->
        </div>

        <!-- View: Preset Editor -->
        <div class="view" id="view-editor">
          <!-- populated by preset-editor.js -->
        </div>

      </main>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Info dialog (about) -->
  <div class="info-overlay" id="info-overlay" hidden>
    <div class="info-dialog">
      <button class="info-dialog__close" id="info-close" title="关闭" data-i18n-title="dialog.close">✕</button>
      <div class="info-dialog__particles" id="info-particles"></div>
      <div class="info-dialog__body">
        <div class="info-dialog__logo-wrap" id="info-logo-wrap">
          <span class="info-dialog__ripple" aria-hidden="true"></span>
          <div class="info-dialog__logo"><img src="assets/logo.svg" alt=""></div>
        </div>
        <div class="info-dialog__content">
          <h2 class="info-dialog__name">osu! Skin Configurator</h2>
          <div class="info-dialog__version" id="info-version"></div>
          <div class="info-dialog__update">
            <button class="btn btn--secondary btn--sm" id="info-check-update" data-i18n="info.checkUpdate">检查更新</button>
            <span class="info-dialog__update-status" id="info-update-status"></span>
          </div>
          <div class="info-dialog__section">
            <ul class="info-dialog__credits">
              <li><a href="https://github.com/Sisurtic/osu-skin-configurator" target="_blank" rel="noopener">GitHub / osu-skin-configurator</a></li>
              <li><a href="https://osu.ppy.sh/users/30298378" target="_blank" rel="noopener">osu! / Citrusis</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/tauri-api.js"></script>
  <script src="js/utils/ini-field-defs.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/state.js"></script>
  <script src="js/shortcuts.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils/op-table.js"></script>
  <script src="js/components/toast.js"></script>
  <script src="js/components/cursor-particles.js"></script>
  <script src="js/components/info-dialog.js"></script>
  <script src="js/components/update-check.js"></script>
  <script src="js/components/settings-view.js"></script>
  <script src="js/components/skin-list.js"></script>
  <script src="js/components/preset-list.js"></script>
  <script src="js/components/preset-selector.js"></script>
  <script src="js/components/ini-editor.js"></script>
  <script src="js/components/file-copy-editor.js"></script>
  <script src="js/components/color-picker.js"></script>
  <script src="js/components/gl-preview.js"></script>
  <script src="js/components/tint-editor.js"></script>
  <script src="js/components/preview-upload.js"></script>
  <script src="js/components/preset-editor.js"></script>
  <script src="js/components/apply-dialog.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
